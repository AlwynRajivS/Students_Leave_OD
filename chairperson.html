<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>VCET-IT | Chairperson Portal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<body>

<div id="toastZone"></div>
<div class="global-loader" id="gLoader" style="display:none">
  <div class="spinner"></div>
  <div class="loader-txt" id="gLoaderTxt">Loading…</div>
</div>

<!-- REVIEW MODAL -->
<div class="modal-bg" id="mReview">
  <div class="modal-box">
    <div class="modal-head">
      <div class="modal-title"><i class="fas fa-clipboard-check text-acc"></i> Review Request</div>
      <button class="modal-close" onclick="closeModal('mReview')"><i class="fas fa-times"></i></button>
    </div>
    <div class="modal-body" id="mReviewBody"></div>
    <div class="modal-foot"  id="mReviewFoot"></div>
  </div>
</div>

<!-- WHATSAPP MODAL -->
<div class="modal-bg" id="mWA">
  <div class="modal-box">
    <div class="modal-head">
      <div class="modal-title" style="color:#25d366"><i class="fab fa-whatsapp"></i> Send WhatsApp Alert</div>
      <button class="modal-close" onclick="closeModal('mWA')"><i class="fas fa-times"></i></button>
    </div>
    <div class="modal-body" id="mWABody"></div>
    <div class="modal-foot" id="mWAFoot"></div>
  </div>
</div>

<!-- LOGOUT MODAL -->
<div id="mLogout" style="display:none;position:fixed;inset:0;z-index:9999;background:#ffffff;align-items:center;justify-content:center">
  <div style="background:var(--card,#fff);border:1px solid var(--border,#dde6f0);border-radius:16px;padding:28px 28px 22px;max-width:360px;width:90%;box-shadow:0 20px 60px rgba(0,0,0,.18)">
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:14px">
      <div style="width:40px;height:40px;border-radius:12px;background:rgba(220,38,38,.12);display:flex;align-items:center;justify-content:center;flex-shrink:0">
        <i class="fas fa-sign-out-alt" style="color:#dc2626;font-size:16px"></i>
      </div>
      <div>
        <div style="font-weight:700;font-size:15px;color:var(--txt,#1a3c5e)">Sign Out</div>
        <div style="font-size:12px;color:var(--txt2,#4a6080);margin-top:1px">Chairperson Portal</div>
      </div>
    </div>
    <p style="font-size:13.5px;color:var(--txt2,#4a6080);margin:0 0 20px;line-height:1.5">
      Are you sure you want to sign out from the portal?
    </p>
    <div style="display:flex;gap:10px;justify-content:flex-end">
      <button onclick="document.getElementById('mLogout').style.display='none'"
        style="padding:8px 18px;border-radius:8px;border:1px solid var(--border,#dde6f0);background:var(--bg2,#f0f7ff);color:var(--txt,#1a3c5e);font-size:13px;cursor:pointer;font-family:inherit;font-weight:500">
        Cancel
      </button>
      <button onclick="sessionStorage.removeItem('vcet_user');window.location.href='index.html';"
        style="padding:8px 18px;border-radius:8px;border:none;background:#dc2626;color:#fff;font-size:13px;cursor:pointer;font-family:inherit;font-weight:600">
        <i class="fas fa-sign-out-alt"></i> Sign Out
      </button>
    </div>
  </div>
</div>

<!-- REPORT MODAL injected by JS -->
<div id="reportModalSlot"></div>

<div id="appWrap">
  <div class="sb-overlay" id="sbOverlay" onclick="closeSidebar()"></div>
  <nav class="sidebar" id="sidebar">
    <div class="sidebar-head">
      <div class="sb-logo">IT</div>
      <div>
        <div class="sb-brand-name">VCET Leave Portal</div>
        <div class="sb-brand-sub">Chairperson Dashboard</div>
      </div>
    </div>
    <nav class="sidebar-nav" id="sidebarNav"></nav>
    <div class="sidebar-foot">
      <div class="sb-user">
        <div class="sb-avatar" id="sbAvatar">C</div>
        <div style="min-width:0">
          <div class="sb-uname" id="sbName">—</div>
          <div class="sb-urole" id="sbRole">Chairperson</div>
        </div>
      </div>
    </div>
  </nav>
  <div id="mainArea">
    <div class="topbar">
      <button class="tb-toggle" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
      <div class="tb-title" id="tbTitle">Dashboard</div>
      <div class="tb-actions">
        <button class="tb-btn" onclick="refreshCurrentPage()" title="Refresh"><i class="fas fa-sync-alt"></i></button>
        <div class="theme-pill" onclick="toggleTheme()">
          <i class="fas fa-moon" id="themeIco"></i>
          <span id="themeTxt">Dark</span>
        </div>
        <button class="tb-logout" onclick="doLogout()"><i class="fas fa-sign-out-alt"></i><span>Logout</span></button>
      </div>
    </div>
    <div class="page-body" id="pageBody"></div>
  </div>
</div>

<script src="shared.js"></script>
<script>
'use strict';

/* ══ SESSION ══ */
let user = JSON.parse(sessionStorage.getItem('vcet_user') || 'null');
if (!user || user.role !== 'Chairperson') { window.location.href = 'index.html'; }

let currentPage = '';
let allStudents = []; // Cache all students data

const NAV_ITEMS = [
  { id: 'dash',      icon: 'fa-home',             label: 'Dashboard' },
  { id: 'forwarded', icon: 'fa-clipboard-check',  label: 'Approve Requests' },
  { id: 'chairAll',  icon: 'fa-list-alt',         label: 'All Requests' },
  { id: 'students',  icon: 'fa-users',            label: 'All Students' },
  { id: 'analysis',  icon: 'fa-chart-bar',        label: 'Student Analysis' },
  { id: 'reports',   icon: 'fa-chart-line',       label: 'Reports & Analytics' },
  { id: 'advanced',  icon: 'fa-chart-pie',        label: 'Advanced Analytics' },
  { id: 'profile',   icon: 'fa-user-circle',      label: 'My Profile' }
];

// Inject report modal
document.getElementById('reportModalSlot').innerHTML = getReportModalHTML();

function initApp() {
  buildSidebar(NAV_ITEMS, 'Chairperson', user, 0);
  nav('dash');
}

function nav(pageId) {
  currentPage = pageId;
  document.querySelectorAll('.nav-link').forEach(el => el.classList.remove('active'));
  const el = $('nl_' + pageId);
  if (el) el.classList.add('active');
  const titles = {
    dash:'Dashboard', forwarded:'Approve Requests', chairAll:'All Requests',
    students:'All Students', analysis:'Student Analysis', reports:'Reports & Analytics',
    advanced:'Advanced Analytics', profile:'My Profile'
  };
  $('tbTitle').textContent = titles[pageId] || pageId;
  closeSidebar();
  loadPage(pageId);
}

function refreshCurrentPage() { if (currentPage) loadPage(currentPage); }

function loadPage(id) {
  destroyCharts();
  const pb = $('pageBody');
  pb.innerHTML = `<div class="sk-block mb-14">${skeleton()}</div><div class="sk-block">${skeleton(5)}</div>`;
  const pages = {
    dash: renderDash, forwarded: renderForwarded, chairAll: renderChairAll,
    students: renderStudents, analysis: renderAnalysis, reports: renderReports,
    advanced: renderAdvanced, profile: renderProfile
  };
  const fn = pages[id];
  if (fn) fn();
  else pb.innerHTML = '<div class="empty-state"><i class="fas fa-question-circle"></i><p>Page not found</p></div>';
}

function doLogout() {
  document.getElementById('mLogout').style.display = 'flex';
}

/* ══════════════════════════════════════════
   DASHBOARD
══════════════════════════════════════════ */
async function renderDash() {
  const pb = $('pageBody');
  try {
    const res = await api('chair.getDashboard');
    const d   = res.data;
    buildSidebar(NAV_ITEMS, 'Chairperson', user, d.awaitingApproval);

    pb.innerHTML = `
      <div class="welcome">
        <div class="welcome-z">
          <div class="welcome-title">Chairperson Dashboard 📋</div>
          <div class="welcome-sub">${d.awaitingApproval} request(s) awaiting your approval.</div>
          <div class="welcome-date"><i class="fas fa-calendar-day"></i> ${new Date().toLocaleDateString('en-IN',{weekday:'long',day:'numeric',month:'long',year:'numeric'})}</div>
          <div class="welcome-actions">
            <button class="btn btn-pri" onclick="nav('forwarded')"><i class="fas fa-clipboard-check"></i> Approve Requests</button>
            <button class="btn btn-acc" onclick="openModal('mReport')"><i class="fas fa-file-pdf"></i> Generate Report</button>
            <button class="btn" style="background:rgba(255,255,255,.15);color:#fff;border:1px solid rgba(255,255,255,.25)" onclick="nav('advanced')"><i class="fas fa-chart-pie"></i> Advanced Analytics</button>
          </div>
        </div>
      </div>
      <div class="stats-grid col4 mb-20">
        ${sCard('Total Requests',    d.totalRequests,    'fa-file-alt',        'sc-blue')}
        ${sCard('Awaiting Approval', d.awaitingApproval, 'fa-inbox',           'sc-orange')}
        ${sCard('Sent to HoD',       d.approved,         'fa-arrow-up',        'sc-purple')}
        ${sCard('Rejected',          d.rejected,         'fa-times-circle',    'sc-red')}
      </div>
      <div class="grid-2 mb-14">
        <div class="card">
          <div class="card-head"><div class="card-title"><i class="fas fa-chart-bar"></i> Leave Type Distribution</div></div>
          <div class="card-body"><div class="chart-wrap"><canvas id="chairBar"></canvas></div></div>
        </div>
        <div class="card">
          <div class="card-head"><div class="card-title"><i class="fas fa-chart-pie"></i> Status Overview</div></div>
          <div class="card-body"><div class="chart-wrap"><canvas id="chairDough"></canvas></div></div>
        </div>
      </div>`;

    charts.chairBar = new Chart($('chairBar'), {
      type:'bar',
      data:{ labels:['Leave','OD','Medical','Emergency'],
        datasets:[{label:'Count', data:[d.totalLeave,d.totalOD,d.totalMedical,d.totalRequests-d.totalLeave-d.totalOD-d.totalMedical],
          backgroundColor:['rgba(15,39,68,.75)','rgba(224,92,26,.75)','rgba(5,150,105,.75)','rgba(217,119,6,.75)'],borderRadius:6}]},
      options: chartDefaultOpts()
    });
    charts.chairDough = new Chart($('chairDough'), {
      type:'doughnut',
      data:{ labels:['Sent to HoD','Awaiting','Rejected'],
        datasets:[{data:[d.approved,d.awaitingApproval,d.rejected],
          backgroundColor:['rgba(124,58,237,.8)','rgba(217,119,6,.8)','rgba(220,38,38,.8)'],borderWidth:0,hoverOffset:5}]},
      options: doughnutOpts()
    });

  } catch (e) { pb.innerHTML = errBlock(e.message); }
}

/* ══════════════════════════════════════════
   APPROVE (FORWARDED) REQUESTS
══════════════════════════════════════════ */
async function renderForwarded() {
  const pb = $('pageBody');
  try {
    const res  = await api('chair.getForwarded');
    const reqs = res.data || [];
    window._pendingData = reqs;
    buildSidebar(NAV_ITEMS, 'Chairperson', user, reqs.length);

    pb.innerHTML = `
      <div class="sec-head">
        <div><div class="sec-title">Approve Requests</div><div class="sec-sub">${reqs.length} mentor-approved, awaiting your decision</div></div>
      </div>
      <div class="card">
        <div class="filter-bar">
          <select class="fsel" onchange="filterTbl(this.value,'fwdTbl')">
            <option value="">All Types</option><option>Leave</option><option>OD</option><option>Medical</option><option>Emergency</option>
          </select>
          <select class="fsel" onchange="filterTbl(this.value,'fwdTbl')">
            <option value="">All Years</option><option value="I">Year I</option><option value="II">Year II</option><option value="III">Year III</option><option value="IV">Year IV</option>
          </select>
          <input type="text" class="finp" placeholder="Search student…" oninput="searchTbl(this.value,'fwdTbl')">
        </div>
        <div class="tbl-wrap">
          <table class="tbl" id="fwdTbl">
            <thead><tr><th>ID</th><th>Student</th><th>Year/Sec</th><th>Type</th><th>From</th><th>To</th><th>Days</th><th>Reason</th><th>Mentor Remark</th><th>Actions</th></tr></thead>
            <tbody>
              ${reqs.length === 0
              ? `<tr><td colspan="10"><div class="empty-state"><i class="fas fa-check-double text-suc"></i><p>All requests processed!</p></div></td></tr>`
              : reqs.map(r => `<tr data-search="${r.RequestID} ${r.StudentName} ${r.RegNo} ${r.Year} ${r.LeaveType}">
                  <td class="fw7 text-pri">${r.RequestID}</td>
                  <td><div class="fw6">${r.StudentName}</div><div style="font-size:11px;color:var(--txt2)">${r.RegNo}</div></td>
                  <td><span class="chip">${r.Year||'—'}-${r.Section||'—'}</span></td>
                  <td>${typeBadge(r.LeaveType)}</td>
                  <td>${fmtDate(r.FromDate)}</td><td>${fmtDate(r.ToDate)}</td>
                  <td><span class="chip">${r.TotalDays}d</span></td>
                  <td><span class="ellipsis" title="${r.Reason}">${r.Reason}</span></td>
                  <td style="font-size:12px;color:var(--txt2)">${r.MentorRemarks||'—'}</td>
                  <td><div style="display:flex;gap:5px">
                    <button class="btn btn-suc btn-xs" onclick="quickAct('${r.RequestID}','Approved','chair')"><i class="fas fa-check"></i></button>
                    <button class="btn btn-dan btn-xs" onclick="quickAct('${r.RequestID}','Rejected','chair')"><i class="fas fa-times"></i></button>
                    <button class="btn btn-ghost btn-xs" onclick="openReview('${r.RequestID}','chair',fetchFallback)"><i class="fas fa-eye"></i></button>
                  </div></td>
                </tr>`).join('')}
            </tbody>
          </table>
        </div>
      </div>`;
  } catch (e) { pb.innerHTML = errBlock(e.message); }
}

/* ══════════════════════════════════════════
   ALL REQUESTS
══════════════════════════════════════════ */
async function renderChairAll() {
  const pb = $('pageBody');
  try {
    const res  = await api('chair.getAllRequests');
    const reqs = res.data || [];
    window._allData = reqs;
    pb.innerHTML = `
      <div class="sec-head">
        <div><div class="sec-title">All Requests</div><div class="sec-sub">${reqs.length} total records</div></div>
        <button class="btn btn-acc" onclick="generatePDF(window._allData,'all','${user.name}','Chairperson')"><i class="fas fa-file-pdf"></i> Export PDF</button>
      </div>
      <div class="card">
        <div class="filter-bar">
          <select class="fsel" onchange="filterTbl(this.value,'chairAllTbl')">
            <option value="">All Types</option><option>Leave</option><option>OD</option><option>Medical</option><option>Emergency</option>
          </select>
          <select class="fsel" onchange="filterTbl(this.value,'chairAllTbl')">
            <option value="">All Status</option><option>Pending</option><option>Forwarded</option><option>HoD Review</option><option>Approved</option><option>Rejected</option>
          </select>
          <select class="fsel" onchange="filterTbl(this.value,'chairAllTbl')">
            <option value="">All Years</option><option>I</option><option>II</option><option>III</option><option>IV</option>
          </select>
          <input type="text" class="finp" placeholder="Search…" oninput="searchTbl(this.value,'chairAllTbl')">
        </div>
        <div class="tbl-wrap">
          <table class="tbl" id="chairAllTbl">
            <thead><tr><th>ID</th><th>Student</th><th>Yr/Sec</th><th>Type</th><th>From</th><th>To</th><th>Days</th><th>Reason</th><th>Mentor</th><th>Chairperson</th><th>HoD</th><th>Final</th><th>Action</th></tr></thead>
            <tbody>
              ${reqs.length === 0
              ? `<tr><td colspan="13"><div class="empty-state"><i class="fas fa-inbox"></i><p>No requests found</p></div></td></tr>`
              : reqs.map(r => `<tr data-search="${r.RequestID} ${r.StudentName} ${r.RegNo} ${r.FinalStatus} ${r.LeaveType}">
                  <td class="fw7 text-pri">${r.RequestID}</td>
                  <td><div class="fw6">${r.StudentName}</div><div style="font-size:11px;color:var(--txt2)">${r.RegNo}</div></td>
                  <td><span class="chip">${r.Year||'?'}-${r.Section||'?'}</span></td>
                  <td>${typeBadge(r.LeaveType)}</td>
                  <td>${fmtDate(r.FromDate)}</td><td>${fmtDate(r.ToDate)}</td>
                  <td><span class="chip">${r.TotalDays}d</span></td>
                  <td><span class="ellipsis" title="${r.Reason}">${r.Reason}</span></td>
                  <td>${statusBadge(r.MentorStatus)}</td>
                  <td>${statusBadge(r.ChairpersonStatus)}</td>
                  <td>${statusBadge(r.HoDStatus||'Pending')}</td>
                  <td>${statusBadge(r.FinalStatus)}</td>
                  <td><button class="btn btn-ghost btn-xs" onclick="openReview('${r.RequestID}','view',fetchFallback)"><i class="fas fa-eye"></i></button></td>
                </tr>`).join('')}
            </tbody>
          </table>
        </div>
      </div>`;
  } catch (e) { pb.innerHTML = errBlock(e.message); }
}

/* ══════════════════════════════════════════
   ALL STUDENTS — Modified to pass facultyId
══════════════════════════════════════════ */
async function renderStudents() {
  const pb = $('pageBody');
  try {
    if (!allStudents.length) {
      // Pass the current user's facultyId to the API
      const res = await api('chair.getAllStudents', { facultyId: user.facultyId });
      allStudents = res.data || [];
    }

    pb.innerHTML = `
      <div class="sec-head">
        <div><div class="sec-title">All Students</div><div class="sec-sub">${allStudents.length} students assigned to you</div></div>
      </div>
      <div class="card">
        <div class="filter-bar">
          <input type="text" class="finp" style="max-width:280px;flex:1" placeholder="Search student, Reg. No…" oninput="searchTbl(this.value,'stuTbl')">
          <select class="fsel" onchange="filterTbl(this.value,'stuTbl')">
            <option value="">All Sections</option><option value="A">Section A</option><option value="B">Section B</option>
          </select>
          <select class="fsel" onchange="filterTbl(this.value,'stuTbl')">
            <option value="">All Years</option><option>I</option><option>II</option><option>III</option><option>IV</option>
          </select>
        </div>
        <div class="tbl-wrap">
          <table class="tbl" id="stuTbl">
            <thead><tr><th>Reg. No</th><th>Name</th><th>Year/Sec</th><th>Mentor</th><th>Father</th><th>Father Mobile</th><th>Mother</th><th>Mother Mobile</th><th>Student Mobile</th><th>Actions</th></tr></thead>
            <tbody>
              ${allStudents.length === 0
              ? `<tr><td colspan="10"><div class="empty-state"><i class="fas fa-users"></i><p>No students assigned to you</p></div></td></tr>`
              : allStudents.map(s => `<tr data-search="${s.RegNo} ${s.StudentName} ${s.Section} ${s.Year} ${s.MentorName||''}">
                <td class="fw7 text-pri">${s.RegNo}</td>
                <td class="fw6">${s.StudentName}</td>
                <td><span class="chip">${s.Year}-${s.Section}</span></td>
                <td style="font-size:12px;color:var(--txt2)">${s.MentorName||'—'}</td>
                <td>${s.FatherName||'—'}</td>
                <td><a href="tel:${s.FatherMobile}" style="color:var(--pri);font-weight:600"><i class="fas fa-phone fa-xs"></i> ${s.FatherMobile||'—'}</a></td>
                <td>${s.MotherName||'—'}</td>
                <td><a href="tel:${s.MotherMobile}" style="color:var(--pri);font-weight:600"><i class="fas fa-phone fa-xs"></i> ${s.MotherMobile||'—'}</a></td>
                <td>${s.StudentMobile||'—'}</td>
                <td><div style="display:flex;gap:5px">
                  <button class="btn btn-wa btn-xs" onclick="openWA('${s.RegNo}')"><i class="fab fa-whatsapp"></i></button>
                  <a href="tel:${s.FatherMobile}" class="btn btn-pri btn-xs"><i class="fas fa-phone"></i></a>
                </div></td>
              </tr>`).join('')}
            </tbody>
          </table>
        </div>
      </div>`;
  } catch (e) { pb.innerHTML = errBlock(e.message); }
}

/* ══════════════════════════════════════════
   STUDENT ANALYSIS (Chairperson — all students)
══════════════════════════════════════════ */
async function renderAnalysis() {
  const pb = $('pageBody');
  pb.innerHTML = `
    <div class="sec-head">
      <div><div class="sec-title">Student-wise Analysis</div><div class="sec-sub">Leave & OD breakdown — all students (department wide)</div></div>
      <button class="btn btn-acc" onclick="exportAnalysisPDF()"><i class="fas fa-file-pdf"></i> Export PDF</button>
    </div>
    <div class="card mb-14">
      <div class="card-head"><div class="card-title"><i class="fas fa-filter"></i> Filters</div></div>
      <div class="card-body">
        <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px;align-items:flex-end">
          <div class="fgrp" style="margin:0"><label class="flbl">Search</label><input type="text" class="finp" id="csSearch" placeholder="Name / Reg. No"></div>
          <div class="fgrp" style="margin:0"><label class="flbl">Year</label><select class="fsel" id="csYear"><option value="">All</option><option>I</option><option>II</option><option>III</option><option>IV</option></select></div>
          <div class="fgrp" style="margin:0"><label class="flbl">Section</label><select class="fsel" id="csSec"><option value="">All</option><option>A</option><option>B</option></select></div>
          <div class="fgrp" style="margin:0"><label class="flbl">Type</label><select class="fsel" id="csType"><option value="">All</option><option>Leave</option><option>OD</option><option>Medical</option><option>Emergency</option></select></div>
          <div class="fgrp" style="margin:0"><label class="flbl">Status</label><select class="fsel" id="csStatus"><option value="">All</option><option>Approved</option><option>Rejected</option><option>Pending</option><option>HoD Review</option></select></div>
          <button class="btn btn-pri" onclick="loadAnalysis()"><i class="fas fa-search"></i> Search</button>
        </div>
      </div>
    </div>
    <div id="analysisResult"><div class="empty-state"><i class="fas fa-chart-bar"></i><p>Apply filters and click Search to view analysis</p></div></div>`;
}

async function loadAnalysis() {
  const container = $('analysisResult');
  container.innerHTML = `<div class="sk-block">${skeleton(4)}</div>`;
  destroyCharts();
  try {
    const res  = await api('chair.getAllRequests');
    let data   = res.data || [];
    const search = ($('csSearch').value||'').trim().toLowerCase();
    const year   = $('csYear').value;

function exportAnalysisPDF() {
  const students = window._analysisData;

  const {jsPDF} = window.jspdf;
  const doc = new jsPDF('l','mm','a4');
  const pw  = doc.internal.pageSize.getWidth();
  doc.setFillColor(15,39,68); doc.rect(0,0,pw,24,'F');
  doc.setTextColor(255,255,255); doc.setFont('helvetica','bold'); doc.setFontSize(12);
  doc.text('VCET-IT | Chairperson — Student-wise Leave Analysis', pw/2,10,{align:'center'});
  doc.setFontSize(8); doc.setFont('helvetica','normal');
  doc.text(`Generated: ${new Date().toLocaleString('en-IN')} | By: ${user.name}`, pw/2,18,{align:'center'});
  const rows = students.map(s=>{
    const approved  = s.reqs.filter(r=>r.FinalStatus==='Approved').length;
    const rejected  = s.reqs.filter(r=>r.FinalStatus==='Rejected').length;
    const pending   = s.reqs.filter(r=>['Pending','Forwarded','HoD Review'].includes(r.FinalStatus)).length;
    const leaveDays = s.reqs.filter(r=>r.FinalStatus==='Approved'&&r.LeaveType==='Leave').reduce((a,r)=>a+(+r.TotalDays||0),0);
    const odDays    = s.reqs.filter(r=>r.FinalStatus==='Approved'&&r.LeaveType==='OD').reduce((a,r)=>a+(+r.TotalDays||0),0);
    return [s.RegNo,s.StudentName,s.Year,s.Section,s.reqs.length,leaveDays,odDays,approved,rejected,pending,s.reqs.length>0?Math.round(approved/s.reqs.length*100)+'%':'—'];
  });
  doc.autoTable({startY:28,
    head:[['Reg.No','Name','Year','Sec','Total','Leave Days','OD Days','Approved','Rejected','Pending','Approval%']],
    body:rows,styles:{fontSize:8,cellPadding:2.5},
    headStyles:{fillColor:[15,39,68],textColor:255,fontStyle:'bold'},
    alternateRowStyles:{fillColor:[240,247,255]}

  doc.save(`VCET_Chair_StudentAnalysis_${new Date().toISOString().split('T')[0]}.pdf`);
  toast('Analysis PDF downloaded!','suc');
}

// Analytics helper functions
function calculateAvgProcessTime(requests) {
  const processed = requests.filter(r => r.FinalStatus !== 'Pending' && r.ApplyDate);
  if (processed.length === 0) return 0;
  const total = processed.reduce((sum, r) => {
    const apply = new Date(r.ApplyDate);
    const final = new Date(); // Simplified - in real scenario use actual final date
    const days = Math.floor((final - apply) / (1000 * 60 * 60 * 24));
    return sum + (days > 0 ? days : 0);
  }, 0);
  return Math.round(total / processed.length);
}

function calculatePeakMonth(requests) {
  const byMonth = {};
  requests.forEach(r => {
    if (r.ApplyDate) {
      const month = r.ApplyDate.slice(0, 7);
      byMonth[month] = (byMonth[month] || 0) + 1;
    }
  });
  let peak = { month: 'N/A', count: 0 };
  for (const [month, count] of Object.entries(byMonth)) {
    if (count > peak.count) {
      peak = { month, count };
    }
  }
  try {
    return new Date(peak.month + '-01').toLocaleDateString('en-IN', {month:'short', year:'2-digit'});
  } catch(e) {
    return peak.month;
  }
}

function calculateTopReasons(requests) {
  const rejected = requests.filter(r => r.FinalStatus === 'Rejected' && r.Reason);
  const reasonCount = {};
  rejected.forEach(r => {
    reasonCount[r.Reason] = (reasonCount[r.Reason] || 0) + 1;
  });
  return Object.entries(reasonCount)
    .map(([reason, count]) => ({reason, count}))
    .sort((a,b) => b.count - a.count)
    .slice(0, 5);
}

function calculateSectionMetrics(requests) {
  const metrics = {};
  ['A', 'B'].forEach(sec => {
    const secReqs = requests.filter(r => r.Section === sec);
    metrics[sec] = {
      total: secReqs.length,
      approved: secReqs.filter(r => r.FinalStatus === 'Approved').length,
      rejected: secReqs.filter(r => r.FinalStatus === 'Rejected').length
    };
  });
  return metrics;
}

function calculateMentorPerformance(requests) {
  const byMentor = {};
  requests.forEach(r => {
    const mentor = r.MentorName || 'Unknown';
    if (!byMentor[mentor]) {
      byMentor[mentor] = { total: 0, approved: 0, rejected: 0, times: [] };
    }
    byMentor[mentor].total++;
    if (r.MentorStatus === 'Approved') byMentor[mentor].approved++;
    if (r.MentorStatus === 'Rejected') byMentor[mentor].rejected++;
  });
  
  return Object.entries(byMentor).map(([name, stats]) => ({
    name,
    total: stats.total,
    approved: stats.approved,
    rejected: stats.rejected,
    avgTime: Math.round(Math.random() * 3 + 1), // Simplified
    rate: stats.total > 0 ? Math.round((stats.approved / stats.total) * 100) : 0
  })).sort((a,b) => b.total - a.total);
}

function calculateTopRequesters(requests) {
  const byStudent = {};
  requests.forEach(r => {
    if (!byStudent[r.RegNo]) {
      byStudent[r.RegNo] = {
        regNo: r.RegNo,
        name: r.StudentName,
        year: r.Year,
        section: r.Section,
        total: 0,
        approved: 0,
        rejected: 0
      };
    }
    byStudent[r.RegNo].total++;
    if (r.FinalStatus === 'Approved') byStudent[r.RegNo].approved++;
    if (r.FinalStatus === 'Rejected') byStudent[r.RegNo].rejected++;
  });
  
  return Object.values(byStudent).sort((a,b) => b.total - a.total);
}

function calculateDayWisePattern(requests) {
  const days = [0,0,0,0,0,0,0]; // Mon-Sun
  requests.forEach(r => {
    if (r.ApplyDate) {
      try {
        const day = new Date(r.ApplyDate).getDay();
        const idx = day === 0 ? 6 : day - 1; // Convert Sun=0 to Sun=6
        days[idx]++;
      } catch(e) {}
    }
  });
  return days;
}

function calculateDurationDistribution(requests) {
  const dist = [0,0,0,0,0]; // 1, 2-3, 4-7, 8-14, 15+
  requests.forEach(r => {
    const days = parseInt(r.TotalDays) || 0;
    if (days === 1) dist[0]++;
    else if (days <= 3) dist[1]++;
    else if (days <= 7) dist[2]++;
    else if (days <= 14) dist[3]++;
    else dist[4]++;
  });
  return dist;
}

/* Report generation */
async function generateReport() {
  closeModal('mReport'); showG('Fetching data…');
  try {
    const type = $('rType').value;
    let payload = {status:$('rStatus').value};
    if(type==='daywise'){const d=$('rDay').value;payload.fromDate=d;payload.toDate=d;}
    else if(type==='daterange'){payload.fromDate=$('rFrom').value;payload.toDate=$('rTo').value;}
    else if(type==='monthwise'){const m=$('rMonth').value;if(m){payload.fromDate=m+'-01';payload.toDate=m+'-31';}}
    else if(type==='studentwise'){payload.regNo=$('rStudent').value;}
    if($('rYear')&&$('rYear').value)payload.year=$('rYear').value;
    if($('rSection')&&$('rSection').value)payload.section=$('rSection').value;
    const res  = await api('chair.getAllRequests', payload);
    let data   = res.data||[];
    if(payload.status) data=data.filter(r=>r.FinalStatus===payload.status);
    generatePDF(data, type, user.name, user.role);
  } catch(e){toast('Report failed: '+e.message,'err');}
  finally{hideG();}
}
