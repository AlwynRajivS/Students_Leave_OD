<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>VCET-IT | Leave &amp; OD Portal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --navy-deep:   #04101f;
  --navy-mid:    #071b35;
  --navy-light:  #0d2d55;
  --navy-bright: #143d6e;
  --gold:        #c9973a;
  --gold-light:  #e8b96a;
  --gold-pale:   #f5e4c0;
  --white:       #ffffff;
  --off-white:   #eef2f8;
  --muted:       rgba(200,215,235,0.55);
  --muted-dark:  rgba(150,180,215,0.35);
  --danger:      #e05252;
  --glass:       rgba(255,255,255,0.04);
  --glass-border:rgba(255,255,255,0.10);
}

html, body {
  height: 100%;
  font-family: 'DM Sans', sans-serif;
  background: var(--navy-deep);
  color: var(--white);
  overflow-x: hidden;
}

/* ── CANVAS BG ── */
#bgCanvas {
  position: fixed; inset: 0; z-index: 0;
  pointer-events: none;
}

/* ── LAYOUT ── */
.page {
  min-height: 100vh;
  display: grid;
  grid-template-columns: 1fr 1fr;
  position: relative;
  z-index: 1;
}

/* ── LEFT PANEL ── */
.left-panel {
  position: relative;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  padding: 52px 56px;
  overflow: hidden;
}

.left-panel::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(145deg, rgba(20,61,110,0.55) 0%, rgba(4,16,31,0.3) 100%);
  backdrop-filter: blur(0px);
  z-index: 0;
}

/* Geometric rings */
.ring {
  position: absolute;
  border-radius: 50%;
  border: 1px solid rgba(201,151,58,0.12);
  pointer-events: none;
}
.ring-1 { width: 480px; height: 480px; top: -100px; left: -160px; animation: ringPulse 6s ease-in-out infinite; }
.ring-2 { width: 320px; height: 320px; top: 60px; left: -60px; border-color: rgba(201,151,58,0.07); animation: ringPulse 6s ease-in-out infinite 1.5s; }
.ring-3 { width: 600px; height: 600px; bottom: -180px; right: -200px; animation: ringPulse 8s ease-in-out infinite 0.8s; }
@keyframes ringPulse {
  0%, 100% { transform: scale(1); opacity: 1; }
  50%       { transform: scale(1.03); opacity: 0.6; }
}

.left-top, .left-bottom { position: relative; z-index: 1; }

/* Logo mark */
.logo-mark {
  display: flex; align-items: center; gap: 14px;
  animation: fadeUp 0.7s ease both;
}
.logo-hex {
  width: 52px; height: 52px;
  background: linear-gradient(135deg, var(--gold) 0%, var(--gold-light) 100%);
  clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
  display: flex; align-items: center; justify-content: center;
  font-family: 'Syne', sans-serif;
  font-weight: 800; font-size: 18px; color: var(--navy-deep);
  flex-shrink: 0;
}
.logo-text-top { font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 700; letter-spacing: 2.5px; color: var(--gold-light); text-transform: uppercase; }
.logo-text-bot { font-size: 11px; color: var(--muted); margin-top: 2px; font-weight: 300; letter-spacing: 0.5px; }

/* Hero text */
.hero { margin-top: 80px; animation: fadeUp 0.7s ease 0.15s both; }
.hero-eyebrow {
  font-size: 11px; font-weight: 500; letter-spacing: 3px;
  text-transform: uppercase; color: var(--gold);
  display: flex; align-items: center; gap: 10px; margin-bottom: 20px;
}
.hero-eyebrow::before {
  content: ''; display: block; width: 28px; height: 1.5px; background: var(--gold);
}
.hero-title {
  font-family: 'DM Serif Display', serif;
  font-size: clamp(36px, 3.5vw, 52px);
  line-height: 1.12;
  color: var(--white);
  margin-bottom: 20px;
}
.hero-title em { color: var(--gold-light); font-style: italic; }
.hero-desc { font-size: 15px; color: var(--muted); line-height: 1.75; font-weight: 300; max-width: 360px; }

/* Portal chips */
.portal-chips { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 36px; animation: fadeUp 0.7s ease 0.3s both; }
.chip {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 16px;
  background: var(--glass); border: 1px solid var(--glass-border);
  border-radius: 40px; font-size: 12px; color: var(--off-white); font-weight: 400;
  backdrop-filter: blur(8px);
  transition: all 0.25s;
}
.chip svg { width: 14px; height: 14px; stroke: var(--gold-light); fill: none; flex-shrink: 0; }
.chip:hover { background: rgba(201,151,58,0.1); border-color: rgba(201,151,58,0.3); color: var(--gold-pale); }

/* Bottom stat strip */
.stat-strip { display: flex; gap: 32px; animation: fadeUp 0.7s ease 0.4s both; }
.stat-item {}
.stat-num { font-family: 'Syne', sans-serif; font-size: 26px; font-weight: 700; color: var(--gold-light); line-height: 1; }
.stat-lbl { font-size: 11px; color: var(--muted); margin-top: 4px; font-weight: 300; letter-spacing: 0.5px; }
.stat-divider { width: 1px; background: var(--glass-border); }

/* ── RIGHT PANEL ── */
.right-panel {
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 48px 64px;
  position: relative;
}

.right-panel::before {
  content: '';
  position: absolute;
  inset: 0;
  background: rgba(4,12,24,0.45);
  backdrop-filter: blur(24px);
  border-left: 1px solid var(--glass-border);
}

/* Form card */
.form-card {
  width: 100%; max-width: 400px;
  position: relative; z-index: 1;
  animation: fadeUp 0.6s ease 0.2s both;
}

.form-header { margin-bottom: 36px; }
.form-greeting {
  font-size: 11px; font-weight: 500; letter-spacing: 2.5px;
  text-transform: uppercase; color: var(--gold);
  display: flex; align-items: center; gap: 8px;
  margin-bottom: 12px;
}
.form-greeting span { width: 20px; height: 1.5px; background: var(--gold); display: block; }
.form-title {
  font-family: 'Syne', sans-serif;
  font-size: 30px; font-weight: 700;
  color: var(--white); line-height: 1.15; margin-bottom: 8px;
}
.form-subtitle { font-size: 13px; color: var(--muted); font-weight: 300; line-height: 1.6; }

/* Auto-role notice */
.auto-notice {
  display: flex; align-items: flex-start; gap: 11px;
  background: rgba(201,151,58,0.08);
  border: 1px solid rgba(201,151,58,0.22);
  border-radius: 10px; padding: 12px 14px; margin-bottom: 28px;
  font-size: 12px; color: var(--gold-pale); line-height: 1.5; font-weight: 300;
}
.auto-notice svg { width: 16px; height: 16px; fill: none; stroke: var(--gold); flex-shrink: 0; margin-top: 1px; }

/* Floating label inputs */
.field { position: relative; margin-bottom: 20px; }
.field-inner { position: relative; }
.field-input {
  width: 100%;
  padding: 18px 16px 7px 16px;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 12px;
  color: var(--white);
  font-family: 'DM Sans', sans-serif;
  font-size: 15px;
  font-weight: 400;
  transition: border-color 0.25s, background 0.25s, box-shadow 0.25s;
  outline: none;
  -webkit-appearance: none;
}
.field-input:focus {
  border-color: rgba(201,151,58,0.6);
  background: rgba(255,255,255,0.07);
  box-shadow: 0 0 0 4px rgba(201,151,58,0.08), inset 0 1px 0 rgba(255,255,255,0.04);
}
.field-input::placeholder { color: transparent; }
.field-input:-webkit-autofill,
.field-input:-webkit-autofill:focus {
  -webkit-box-shadow: 0 0 0 1000px #0d2540 inset;
  -webkit-text-fill-color: var(--white);
  caret-color: var(--white);
}

.field-label {
  position: absolute;
  left: 16px; top: 50%;
  transform: translateY(-50%);
  font-size: 14px; color: rgba(200,215,235,0.5);
  pointer-events: none;
  transition: all 0.2s ease;
  font-weight: 300;
  letter-spacing: 0.3px;
}
.field-input:focus + .field-label,
.field-input:not(:placeholder-shown) + .field-label {
  top: 10px;
  transform: translateY(0);
  font-size: 10px;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: var(--gold);
  font-weight: 500;
}
.field-line {
  position: absolute; bottom: 0; left: 16px; right: 16px;
  height: 1.5px; background: var(--gold);
  transform: scaleX(0); transform-origin: left;
  transition: transform 0.3s ease; border-radius: 2px;
}
.field-input:focus ~ .field-line { transform: scaleX(1); }

/* Eye toggle */
.eye-btn {
  position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
  background: none; border: none; cursor: pointer;
  color: rgba(200,215,235,0.4); padding: 4px;
  transition: color 0.2s;
}
.eye-btn:hover { color: var(--gold-light); }
.eye-btn svg { width: 18px; height: 18px; fill: none; stroke: currentColor; stroke-width: 1.8; }

/* Submit button */
.btn-submit {
  width: 100%;
  padding: 15px 24px;
  background: linear-gradient(135deg, var(--gold) 0%, var(--gold-light) 100%);
  color: var(--navy-deep);
  border: none;
  border-radius: 12px;
  font-family: 'Syne', sans-serif;
  font-size: 14px;
  font-weight: 700;
  letter-spacing: 1.2px;
  text-transform: uppercase;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center; gap: 10px;
  transition: all 0.3s;
  margin-top: 8px;
  position: relative;
  overflow: hidden;
}
.btn-submit::before {
  content: '';
  position: absolute;
  top: 0; left: -100%;
  width: 60%; height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.25), transparent);
  transition: left 0.5s ease;
}
.btn-submit:hover::before { left: 150%; }
.btn-submit:hover {
  transform: translateY(-2px);
  box-shadow: 0 12px 32px rgba(201,151,58,0.35);
}
.btn-submit:active { transform: translateY(0); }
.btn-submit:disabled { opacity: 0.6; cursor: not-allowed; transform: none; box-shadow: none; }
.btn-submit svg { width: 18px; height: 18px; fill: none; stroke: currentColor; stroke-width: 2; flex-shrink: 0; }

/* Spinner */
.spinner {
  width: 18px; height: 18px;
  border: 2.5px solid rgba(4,16,31,0.3);
  border-top-color: var(--navy-deep);
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
  flex-shrink: 0;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* Error */
.error-box {
  display: none;
  align-items: flex-start; gap: 10px;
  background: rgba(224,82,82,0.08);
  border: 1px solid rgba(224,82,82,0.25);
  border-radius: 10px;
  padding: 12px 14px;
  margin-bottom: 16px;
  font-size: 12.5px; color: #f4aaaa; line-height: 1.5;
}
.error-box.show { display: flex; }
.error-box svg { width: 16px; height: 16px; fill: none; stroke: var(--danger); flex-shrink: 0; margin-top: 1px; }

/* Footer */
.form-footer {
  margin-top: 28px;
  display: flex; align-items: center; gap: 10px;
  justify-content: center;
}
.footer-lock { display: flex; align-items: center; gap: 6px; font-size: 11px; color: rgba(150,180,215,0.4); font-weight: 300; }
.footer-lock svg { width: 13px; height: 13px; fill: none; stroke: rgba(150,180,215,0.35); }
.footer-dot { width: 3px; height: 3px; border-radius: 50%; background: rgba(150,180,215,0.2); }

/* ── ANIMATIONS ── */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(18px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ── MOBILE ── */
@media (max-width: 900px) {
  .page { grid-template-columns: 1fr; min-height: 100vh; }

  .left-panel {
    padding: 36px 28px 32px;
    justify-content: flex-start;
    gap: 0;
  }
  .hero { margin-top: 36px; }
  .hero-title { font-size: 32px; }
  .hero-desc { display: none; }
  .stat-strip { display: none; }
  .portal-chips { margin-top: 20px; gap: 8px; }
  .chip { font-size: 11px; padding: 6px 12px; }

  .right-panel {
    padding: 32px 24px 48px;
    align-items: flex-start;
  }
  .right-panel::before { border-left: none; border-top: 1px solid var(--glass-border); }
  .form-card { max-width: 100%; }
  .form-title { font-size: 26px; }
}

@media (max-width: 480px) {
  .left-panel { padding: 28px 20px 24px; }
  .logo-hex { width: 44px; height: 44px; font-size: 16px; }
  .hero-title { font-size: 28px; }
  .hero { margin-top: 28px; }
  .right-panel { padding: 28px 20px 40px; }
  .form-title { font-size: 24px; }
  .portal-chips { gap: 7px; }
  .chip { font-size: 10.5px; padding: 6px 11px; gap: 6px; }
}
</style>
</head>
<body>

<canvas id="bgCanvas"></canvas>

<div class="page">

  <!-- ── LEFT PANEL ── -->
  <div class="left-panel">
    <div class="ring ring-1"></div>
    <div class="ring ring-2"></div>
    <div class="ring ring-3"></div>

    <div class="left-top">
      <div class="logo-mark">
        <div class="logo-hex">V</div>
        <div>
          <div class="logo-text-top">VCET · IT Dept</div>
          <div class="logo-text-bot">Velammal College of Engineering &amp; Technology</div>
        </div>
      </div>

      <div class="hero">
        <div class="hero-eyebrow">Leave &amp; OD Portal</div>
        <h1 class="hero-title">Smart<br>Sanction<br><em>Management</em></h1>
       
      </div>

      
    </div>

    
  </div>

  <!-- ── RIGHT PANEL ── -->
  <div class="right-panel">
    <div class="form-card">

      <div class="form-header">
        <div class="form-greeting"><span></span>Secure Access</div>
        <h2 class="form-title">Sign in to<br>your account</h2>
        
      </div>

      

      <div id="errBox" class="error-box" role="alert">
        <svg viewBox="0 0 24 24" stroke-width="1.8"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        <span id="errMsg"></span>
      </div>

      <!-- Login ID -->
      <div class="field">
        <div class="field-inner">
          <input type="text" id="lgId" class="field-input" placeholder="x" autocomplete="username">
          <label class="field-label" for="lgId">Login ID</label>
          <div class="field-line"></div>
        </div>
      </div>

      <!-- Password -->
      <div class="field">
        <div class="field-inner">
          <input type="password" id="lgPwd" class="field-input" placeholder="x" autocomplete="current-password" style="padding-right: 48px;">
          <label class="field-label" for="lgPwd">Password</label>
          <div class="field-line"></div>
          <button class="eye-btn" type="button" id="eyeBtn" aria-label="Toggle password visibility" onclick="togglePwd()">
            <svg id="eyeOpen" viewBox="0 0 24 24" stroke-width="1.8"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            <svg id="eyeClosed" viewBox="0 0 24 24" stroke-width="1.8" style="display:none"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
          </button>
        </div>
      </div>

      <button class="btn-submit" id="lgBtn" onclick="handleLogin()">
        <svg viewBox="0 0 24 24"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
        Sign In
      </button>

      <div class="form-footer">
        <div class="footer-lock">
          <svg viewBox="0 0 24 24" stroke-width="1.8"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          
        </div>
        <div class="footer-lock">VCET-IT Staff &amp; Students Only</div>
        <div class="footer-dot"></div>
        <div class="footer-lock">© 2026</div>
      </div>

    </div>
  </div>

</div>

<script>
/* ── PARTICLE CANVAS ── */
(function() {
  const canvas = document.getElementById('bgCanvas');
  const ctx = canvas.getContext('2d');
  let W, H, particles = [], lines = [];

  function resize() {
    W = canvas.width  = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }

  const COLORS = ['rgba(201,151,58,', 'rgba(20,61,110,', 'rgba(13,45,85,'];
  function rand(a, b) { return a + Math.random() * (b - a); }

  function initParticles() {
    particles = [];
    const count = Math.min(60, Math.floor(W * H / 22000));
    for (let i = 0; i < count; i++) {
      particles.push({
        x: rand(0, W), y: rand(0, H),
        r: rand(1, 2.8),
        vx: rand(-0.18, 0.18),
        vy: rand(-0.18, 0.18),
        color: COLORS[Math.floor(rand(0, COLORS.length))],
        alpha: rand(0.25, 0.7)
      });
    }
  }

  function draw() {
    ctx.clearRect(0, 0, W, H);

    /* deep gradient bg */
    const bg = ctx.createLinearGradient(0, 0, W, H);
    bg.addColorStop(0,   '#04101f');
    bg.addColorStop(0.45,'#071b35');
    bg.addColorStop(1,   '#0d2d55');
    ctx.fillStyle = bg;
    ctx.fillRect(0, 0, W, H);

    /* grid lines — very faint */
    ctx.strokeStyle = 'rgba(255,255,255,0.025)';
    ctx.lineWidth = 1;
    const gx = 80, gy = 80;
    for (let x = 0; x < W; x += gx) { ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,H); ctx.stroke(); }
    for (let y = 0; y < H; y += gy) { ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke(); }

    /* particle connections */
    for (let i = 0; i < particles.length; i++) {
      for (let j = i + 1; j < particles.length; j++) {
        const dx = particles[i].x - particles[j].x;
        const dy = particles[i].y - particles[j].y;
        const dist = Math.sqrt(dx*dx + dy*dy);
        if (dist < 130) {
          ctx.strokeStyle = `rgba(201,151,58,${0.06 * (1 - dist / 130)})`;
          ctx.lineWidth = 0.7;
          ctx.beginPath();
          ctx.moveTo(particles[i].x, particles[i].y);
          ctx.lineTo(particles[j].x, particles[j].y);
          ctx.stroke();
        }
      }
    }

    /* particles */
    particles.forEach(p => {
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fillStyle = p.color + p.alpha + ')';
      ctx.fill();

      p.x += p.vx; p.y += p.vy;
      if (p.x < -10) p.x = W + 10;
      if (p.x > W + 10) p.x = -10;
      if (p.y < -10) p.y = H + 10;
      if (p.y > H + 10) p.y = -10;
    });

    requestAnimationFrame(draw);
  }

  window.addEventListener('resize', () => { resize(); initParticles(); });
  resize(); initParticles(); draw();
})();

/* ── LOGIN LOGIC ── */
const GAS_URL = 'https://script.google.com/macros/s/AKfycbwl18AHLPjCniAIvg2tI4MYFU9Rt-int5nIMOt7nNcP3gqv39BUSWM1h7t0boGN3Ju9cw/exec';

const PORTAL_MAP = {
  Student:     'student.html',
  Mentor:      'mentor.html',
  Chairperson: 'chairperson.html',
  HoD:         'hod.html'
};

function showError(msg) {
  const box = document.getElementById('errBox');
  document.getElementById('errMsg').textContent = msg;
  box.classList.add('show');
}
function hideError() { document.getElementById('errBox').classList.remove('show'); }

function togglePwd() {
  const inp = document.getElementById('lgPwd');
  const open   = document.getElementById('eyeOpen');
  const closed = document.getElementById('eyeClosed');
  if (inp.type === 'password') {
    inp.type = 'text';
    open.style.display   = 'none';
    closed.style.display = 'block';
  } else {
    inp.type = 'password';
    open.style.display   = 'block';
    closed.style.display = 'none';
  }
}

async function handleLogin() {
  const loginId = document.getElementById('lgId').value.trim();
  const password = document.getElementById('lgPwd').value.trim();
  hideError();

  if (!loginId || !password) {
    showError('Please enter your Login ID and Password.');
    return;
  }

  const btn = document.getElementById('lgBtn');
  btn.disabled = true;
  btn.innerHTML = '<div class="spinner"></div> Authenticating…';

  try {
    const res = await fetch(GAS_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify({ action: 'login', data: { loginId, password } })
    });
    if (!res.ok) throw new Error('Server error: HTTP ' + res.status);

    const json = await res.json();
    if (!json.ok) throw new Error(json.msg || 'Invalid credentials. Please try again.');

    const user = json.user;
    const portal = PORTAL_MAP[user.role];
    if (!portal) throw new Error(`Unknown role "${user.role}" returned from server.`);

    sessionStorage.setItem('vcet_user', JSON.stringify(user));

    /* Success flash before redirect */
    btn.innerHTML = '<svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg> Access Granted';
    btn.style.background = 'linear-gradient(135deg,#2e9e6b,#3fbf87)';

    setTimeout(() => { window.location.href = portal; }, 600);

  } catch (e) {
    showError(e.message || 'Login failed. Please check your credentials.');
    btn.disabled = false;
    btn.innerHTML = '<svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg> Sign In';
  }
}

document.getElementById('lgId').addEventListener('keydown',  e => { if (e.key === 'Enter') document.getElementById('lgPwd').focus(); });
document.getElementById('lgPwd').addEventListener('keydown', e => { if (e.key === 'Enter') handleLogin(); });
</script>
